services:
  flask-app:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_workflow_backend
    restart: unless-stopped
    working_dir: /backend
    ports:
      - "${FLASK_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - FLASK_ENV=production
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      # PYTHONPATH helps python find the backend module
      - PYTHONPATH=/
    # We map the backend folder directly to /backend inside container for module resolution
    volumes:
      - ./backend:/backend

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_automation_engine
    restart: always
    ports:
      - "5678:5678"
    environment:
      # Database Configuration
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${POSTGRES_HOST}
      - DB_POSTGRESDB_PORT=${POSTGRES_PORT}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED=false # Common requirement for Aiven/managed clouds
      
      # Security & Basics
      - N8N_ENCRYPTION_KEY=${APP_API_KEY}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      
      # Internal network resolution so it can hit the flask container
      - FLASK_INTERNAL_URL=http://flask-app:5000
    
    # Optional persistent volume if you ever use local files inside n8n
    volumes:
      - n8n_data:/home/node/.n8n
    
    depends_on:
      - flask-app

volumes:
  n8n_data:
